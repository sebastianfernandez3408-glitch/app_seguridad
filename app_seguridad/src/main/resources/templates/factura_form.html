<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/encabezado :: encabezado}"></head>
<body>

<div class="container mt-4">
    <h2>Factura</h2>

    <form th:action="@{/facturas/guardar}" method="post" th:object="${factura}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Total:</label>
            <input type="number" step="0.01" th:field="*{total}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Fecha:</label>
            <input type="date" th:field="*{fecha}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/facturas" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<div th:replace="~{fragmentos/pie_pagina :: pie}"></div>
</body>
</html>
