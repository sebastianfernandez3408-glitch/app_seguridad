<!DOCTYPE html>
<html lang="es">
<head>

    <title>Inicio - App Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;

            align-items: center;
            justify-content: center;
        }
        .contenedor-centro {

        }

            margin: 10px;

            font-size: 16px;
        }
        h1 {

        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="contenedor-centro">
        <h1>Bienvenido a App Seguridad</h1>
        <p>Sistema de gestión con autenticación segura</p>
        <div>
            <a href="/login" class="btn btn-light btn-personalizado">Iniciar Sesión</a>
            <a href="/registro" class="btn btn-outline-light btn-personalizado">Registrarse</a>
        </div>
    </div>

</html>
