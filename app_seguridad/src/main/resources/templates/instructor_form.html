<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Instructor</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <!-- El título cambia según si es nuevo o edición -->
    <h2 th:text="${instructor.id == null} ? 'Nuevo Instructor' : 'Editar Instructor'"></h2>

    <!-- th:object vincula el formulario al objeto instructor -->
    <form th:action="@{/instructores/guardar}" th:object="${instructor}" method="post">
        
        <!-- Campo oculto: guarda el ID para que el guardar sepa si es edición -->
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Especialidad</label>
            <input type="text" th:field="*{especialidad}" class="form-control"
                   placeholder="ej: Defensa personal, Manejo de armas">
        </div>

        <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" th:field="*{telefono}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Documento (Cédula)</label>
            <input type="text" th:field="*{documento}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Años de Experiencia</label>
            <input type="number" th:field="*{aniosExperiencia}" class="form-control" min="0">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/instructores" class="btn btn-secondary">Cancelar</a>

    </form>

</body>
</html>
