<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Instructores</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h2>Instructores</h2>

    <a href="/instructores/nuevo" class="btn btn-primary mb-3">+ Nuevo Instructor</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Documento</th>
                <th>Años Exp.</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="instructor : ${instructores}">
                <td th:text="${instructor.id}"></td>
                <td th:text="${instructor.nombre}"></td>
                <td th:text="${instructor.especialidad}"></td>
                <td th:text="${instructor.telefono}"></td>
                <td th:text="${instructor.email}"></td>
                <td th:text="${instructor.documento}"></td>
                <td th:text="${instructor.aniosExperiencia}"></td>
                <td>
                    <a th:href="@{/instructores/editar/{id}(id=${instructor.id})}"
                       class="btn btn-warning btn-sm">Editar</a>
						<a th:href="@{/instructores/eliminar/{id}(id=${instructor.id})}"
						   class="btn btn-danger btn-sm"
						   onclick="if(!confirm('¿Eliminar este instructor?')) event.preventDefault();">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
