<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragmentos/encabezado :: encabezado}"></head>
<body>

<div class="container mt-4">
    <h2>Instructores</h2>

    <a href="/instructores/nuevo" class="btn btn-success mb-3" sec:authorize="hasRole('ADMIN')">Nuevo</a>

    <table class="table">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Especialidad</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Documento</th>
            <th>Años Exp.</th>
            <th sec:authorize="hasRole('ADMIN')">Acciones</th>
        </tr>

        <tr th:each="instructor : ${instructores}">
            <td th:text="${instructor.id}"></td>
            <td th:text="${instructor.nombre}"></td>
            <td th:text="${instructor.especialidad}"></td>
            <td th:text="${instructor.telefono}"></td>
            <td th:text="${instructor.email}"></td>
            <td th:text="${instructor.documento}"></td>
            <td th:text="${instructor.aniosExperiencia}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/instructores/editar/{id}(id=${instructor.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/instructores/eliminar/{id}(id=${instructor.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar instructor?')">Eliminar</a>
            </td>
        </tr>
    </table>
</div>

<div th:replace="~{fragmentos/pie_pagina :: pie}"></div>
</body>
</html>
