<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - App Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contenedor-login {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
        }
        .contenedor-login h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
            font-size: 28px;
        }
        .subtitulo {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-control {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-iniciar-sesion {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-iniciar-sesion:hover {
            background-color: #764ba2;
        }
        .alerta {
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .credenciales {
            background-color: #f0f4ff;
            padding: 18px;
            border-radius: 8px;
            margin-top: 25px;
            border-left: 4px solid #667eea;
        }
        .credenciales h6 {
            margin: 0 0 12px 0;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .credencial-item {
            margin: 8px 0;
            font-size: 13px;
            color: #555;
        }
        .credencial-item strong {
            color: #667eea;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="contenedor-login">
        <h2>🔐 Iniciar Sesión</h2>
        <p class="subtitulo">Accede a tu cuenta</p>

        <!-- Mensaje de error -->
        <div th:if="${param.error}" class="alert alert-danger alerta" role="alert">
            <strong>Error:</strong> Usuario o contraseña incorrectos
        </div>

        <!-- Mensaje de logout -->
        <div th:if="${param.logout}" class="alert alert-success alerta" role="alert">
            <strong>Éxito:</strong> Has cerrado sesión correctamente
        </div>

        <!-- Formulario -->
        <form method="post" action="/login">
            <div class="form-group mb-3">
                <label for="username">Usuario</label>
                <input 
                    type="text" 
                    id="username"
                    name="username" 
                    class="form-control" 
                    placeholder="Ingresa tu usuario" 
                    required
                    autofocus
                >
            </div>

            <div class="form-group mb-3">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    class="form-control" 
                    placeholder="Ingresa tu contraseña" 
                    required
                >
            </div>

            <button type="submit" class="btn-iniciar-sesion">Iniciar Sesión</button>
        </form>

        <!-- Credenciales -->
        <div class="credenciales">
            <h6>📋 Credenciales de Prueba</h6>
            <div class="credencial-item"><strong>Admin:</strong> admin / admin123</div>
            <div class="credencial-item"><strong>User:</strong> user / user123</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
