<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">

<div class="container mt-5">
    <form method="post" action="/login" class="card p-4">
        <h3>Login</h3>

        <input type="text" name="username" class="form-control mb-2" placeholder="Usuario">
        <input type="password" name="password" class="form-control mb-2" placeholder="Contraseña">

        <button class="btn btn-primary">Ingresar</button>

        <div th:if="${mensajeError}" class="text-danger mt-2">
            <p th:text="${mensajeError}"></p>
        </div>
    </form>
</div>

</body>
</html>
