<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - App Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contenedor-login {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .contenedor-login h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-control {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn-iniciar-sesion {
            width: 100%;
            padding: 10px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-iniciar-sesion:hover {
            background-color: #764ba2;
        }
        .alerta {
            margin-bottom: 20px;
        }
        .enlace-registro {
            text-align: center;
            margin-top: 20px;
        }
        .enlace-registro a {
            color: #667eea;
            text-decoration: none;
        }
        .enlace-registro a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="contenedor-login">
        <h2>Iniciar Sesión</h2>

        <!-- Mensaje de error de autenticación -->
        <div th:if="${param.error}" class="alert alert-danger alerta">
            Usuario o contraseña incorrectos
        </div>

        <!-- Mensaje de éxito de registro -->
        <div th:if="${exito}" class="alert alert-success alerta" th:text="${exito}"></div>

        <form method="post" action="/login">
            <input 
                type="text" 
                name="username" 
                class="form-control" 
                placeholder="Usuario" 
                required
            >
            <input 
                type="password" 
                name="password" 
                class="form-control" 
                placeholder="Contraseña" 
                required
            >
            <button type="submit" class="btn-iniciar-sesion">Iniciar Sesión</button>
        </form>

        <div class="enlace-registro">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
