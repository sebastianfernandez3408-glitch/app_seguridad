<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body class="container mt-5">

<h2>Iniciar Sesión</h2>

<form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Usuario" class="form-control mb-2" required>
    <input type="password" name="password" placeholder="Contraseña" class="form-control mb-2" required>
    <button class="btn btn-primary">Entrar</button>
</form>

<p th:if="${param.error}" class="text-danger">Credenciales inválidas. Intenta de nuevo.</p>
<p th:if="${param.logout}" class="text-success">Has cerrado sesión correctamente.</p>

</body>
</html>
