<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/encabezado :: encabezado"></head>
<body>

<div class="container mt-4">
    <h2>Formulario Pago</h2>

    <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Monto</label>
        <input type="number" step="0.01" th:field="*{monto}" class="form-control mb-2">

        <label>Método</label>
        <input th:field="*{metodo}" class="form-control mb-2">

        <label>Fecha</label>
        <input type="date" th:field="*{fecha}" class="form-control mb-2">

        <!-- Cliente -->
        <label>Cliente</label>
        <select th:field="*{cliente}" class="form-control mb-2">
            <option th:each="c : ${clientes}" 
                    th:value="${c}" 
                    th:text="${c.nombre}">
            </option>
        </select>

        <!-- Contratación -->
        <label>Contratación</label>
        <select th:field="*{contratacion}" class="form-control mb-2">
            <option th:each="con : ${contrataciones}" 
                    th:value="${con}" 
                    th:text="${con.id}">
            </option>
        </select>

        <button class="btn btn-success">Guardar</button>
        <a href="/pagos" class="btn btn-secondary">Cancelar</a>

    </form>
</div>

<div th:replace="fragments/pie_pagina :: pie"></div>
</body>
</html>
