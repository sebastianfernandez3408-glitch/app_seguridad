<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/encabezado :: encabezado"></head>
<body>

<div class="container mt-4">
    <h2>Formulario Programa</h2>

    <form th:action="@{/programas/guardar}" th:object="${programa}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Nombre</label>
        <input th:field="*{nombre}" class="form-control mb-2">

        <label>Descripción</label>
        <textarea th:field="*{descripcion}" class="form-control mb-2"></textarea>

        <label>Duración</label>
        <input th:field="*{duracion}" class="form-control mb-2">

        <label>Costo</label>
        <input type="number" step="0.01" th:field="*{costo}" class="form-control mb-2">

        <label>Instructor</label>
        <select th:field="*{instructor}" class="form-control mb-2">
            <option th:each="i : ${instructores}" 
                    th:value="${i}" 
                    th:text="${i.nombre}">
            </option>
        </select>

        <button class="btn btn-success">Guardar</button>
        <a href="/programas" class="btn btn-secondary">Cancelar</a>

    </form>
</div>

<div th:replace="fragments/pie_pagina :: pie"></div>
</body>
</html>
