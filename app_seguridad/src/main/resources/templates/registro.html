<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - App Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contenedor-registro {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .contenedor-registro h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-control {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn-registrarse {
            width: 100%;
            padding: 10px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-registrarse:hover {
            background-color: #764ba2;
        }
        .alerta {
            margin-bottom: 20px;
        }
        .enlace-login {
            text-align: center;
            margin-top: 20px;
        }
        .enlace-login a {
            color: #667eea;
            text-decoration: none;
        }
        .enlace-login a:hover {
            text-decoration: underline;
        }
        .texto-formulario {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="contenedor-registro">
        <h2>Crear Cuenta</h2>

        <!-- Mensaje de error -->
        <div th:if="${error}" class="alert alert-danger alerta" th:text="${error}"></div>

        <!-- Mensaje de éxito -->
        <div th:if="${exito}" class="alert alert-success alerta" th:text="${exito}"></div>

        <form method="post" action="/registro">
            <input 
                type="text" 
                name="nombreUsuario" 
                class="form-control" 
                placeholder="Usuario" 
                required
                minlength="3"
            >
            <small class="texto-formulario">Mínimo 3 caracteres</small>

            <input 
                type="password" 
                name="contrasena" 
                class="form-control" 
                placeholder="Contraseña" 
                required
                minlength="6"
            >
            <small class="texto-formulario">Mínimo 6 caracteres</small>

            <input 
                type="password" 
                name="confirmarContrasena" 
                class="form-control" 
                placeholder="Confirmar Contraseña" 
                required
                minlength="6"
            >
            <small class="texto-formulario">Debe coincidir con la contraseña anterior</small>

            <button type="submit" class="btn-registrarse">Registrarse</button>
        </form>

        <div class="enlace-login">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
        </div>
    </div>
</body>
</html>
